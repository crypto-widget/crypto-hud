name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt,clippy

      - name: Select pinned Rust toolchain
        run: rustup override set 1.96.0

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run strict Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace --all-targets --no-fail-fast

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pinned cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Audit locked dependencies
        run: cargo audit
