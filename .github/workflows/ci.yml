name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt,clippy

      - name: Select pinned Rust toolchain
        run: rustup override set 1.96.0

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run strict Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace --all-targets --no-fail-fast

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = @()
          Get-ChildItem scripts, packaging/windows -Recurse -File -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $failed += "$($_.FullName): $($errors -join '; ')"
            }
          }
          if ($failed.Count -gt 0) {
            throw ($failed -join "`n")
          }

      - name: Run isolated native smoke checks
        shell: pwsh
        run: |
          & .\scripts\gui-smoke.ps1
          & .\scripts\gui-settings-interaction-smoke.ps1
          & .\scripts\gui-dynamic-layout-smoke.ps1
          & .\scripts\gui-quote-board-layout-smoke.ps1
          & .\scripts\gui-plugin-scale-smoke.ps1
          & .\scripts\gui-widget-scale-smoke.ps1
          & .\scripts\single-instance-smoke.ps1 -SkipBuild

      - name: Run isolated package and update smoke checks
        shell: pwsh
        run: |
          & .\scripts\package-smoke.ps1 -Version v9999.0.1-smoke
          & .\scripts\portable-package-smoke.ps1 -Version v9999.0.1-smoke -SkipBuild
          & .\scripts\update-smoke.ps1 -SkipBuild

  toolkit-crates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal

      - name: Test toolkit-free crates
        run: >-
          cargo +1.96.0 test --locked
          -p crypto-hud-core
          -p crypto-hud-market
          -p crypto-hud-runtime
          -p crypto-hud-shell-state
          --all-targets --no-fail-fast

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pinned cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Audit locked dependencies
        run: cargo audit
